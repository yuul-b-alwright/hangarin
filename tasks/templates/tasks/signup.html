<div style="max-width: 400px; margin: 50px auto; font-family: sans-serif;">
    <h2>Create Account</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 10px; background: #27ae60; color: white; border: none;">Sign Up</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
</div>
