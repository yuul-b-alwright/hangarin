<div style="max-width: 400px; margin: 50px auto; font-family: sans-serif;">
    <h2>Hangarin Login</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 10px; background: #2c3e50; color: white; border: none;">Login</button>
    </form>
    <p>Don't have an account? <a href="{% url 'signup' %}">Sign up here</a></p>
</div>
